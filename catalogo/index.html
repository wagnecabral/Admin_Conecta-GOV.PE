/* ── GovBar ─────────────────────────────────────────────────── */
function GovBar() {
  return (

/* ── Header ─────────────────────────────────────────────────── */
function Header({ activePage, onNav, onAdminClick }) {
  const navItems = ['Início','Como Acessar APIs','Catálogo de APIs','Interoperabilidade','Quem somos'];
  return (
    <div style={{
      background:'linear-gradient(180deg, #1A2E6B 0%, #0034B7 100%)',

<div style={{ display:'flex', alignItems:'center', gap:14 }}>

          <img src="assets/ati_logo.png" alt="ATI"
            style={{ height:40, width:'auto', objectFit:'contain' }}
            onError={e=>{ e.target.style.display='none'; e.target.nextSibling.style.display='flex'; }}
          />
          <div style={{ display:'none', alignItems:'center', justifyContent:'center', width:60, height:40 }}>
            <span style={{ color:'#0034B7', fontSize:14, fontWeight:900 }}>ati</span>
          </div>
        </div>
        <img src="assets/Brasao.png" alt="Brasão de Pernambuco"
          style={{ height:44, width:'auto', objectFit:'contain', filter:'brightness(0) invert(1)' }}
          onError={e=>e.target.style.display='none'}
        />
        <img src="assets/Governo.png" alt="Governo de Pernambuco"
          style={{ height:36, width:'auto', objectFit:'contain' }}
          onError={e=>e.target.style.display='none'}
        />
   </div>
      <nav style={{ display:'flex', gap:0, alignItems:'stretch', height:72 }}>
        {navItems.map(item => {
          const isActive = activePage === item;
          return (
            <div key={item} onClick={()=>onNav(item)} style={{
              padding:'0 16px', height:72, display:'flex', alignItems:'center',
              fontSize:13, fontWeight: isActive ? 600 : 400,
              color:'#F8FAFC',
              borderBottom: isActive ? '3px solid #FFCD37' : '3px solid transparent',
              cursor:'pointer', whiteSpace:'nowrap', transition:'all 0.15s',
              opacity: isActive ? 1 : 0.8,
            }}
              onMouseEnter={e=>{ if(!isActive){ e.currentTarget.style.opacity='1'; e.currentTarget.style.borderBottomColor='rgba(255,205,55,0.4)'; }}}
              onMouseLeave={e=>{ if(!isActive){ e.currentTarget.style.opacity='0.8'; e.currentTarget.style.borderBottomColor='transparent'; }}}
            >

          );

        padding:'0 4px', height:72, display:'flex', alignItems:'center',

/* ── Sobre ────────────────────────────────────────────────────── */
function Sobre() {
  return (
    <div style={{ background:C.white, padding:'48px 24px' }}>
      <div style={{ maxWidth:900, margin:'0 auto' }}>
        <h2 style={{ fontSize:24, fontWeight:700, color:C.text, marginBottom:24 }}>Sobre o Conecta Gov.PE</h2>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:40 }}>
          <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
            <p style={{ fontSize:13.5, color:C.textSec, lineHeight:1.7 }}>
              O Conecta Gov.PE é a plataforma estadual que promove a troca segura de informações entre sistemas. Inspirada no modelo federal do Conecta gov.br, a solução foca no princípio de que o governo não deve solicitar ao cidadão informações que o próprio Estado já possua. Seu propósito central é facilitar o fluxo de dados dentro da administração pública, assegurando que o compartilhamento ocorra de forma eficiente e alinhada às melhores práticas de governo digital.
            </p>
            <p style={{ fontSize:13.5, color:C.textSec, lineHeight:1.7 }}>
              Nesse contexto, o cidadão é o principal beneficiário, uma vez que a plataforma viabiliza jornadas de serviço unificadas e simplifica a interação com o Estado. Ao eliminar a necessidade de navegar por múltiplos portais ou de reapresentar documentos de forma redundante, as demandas passam a ser resolvidas em um ponto de contato mais ágil e inteligente.
            </p>
          </div>
          <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
            <p style={{ fontSize:13.5, color:C.textSec, lineHeight:1.7 }}>
              No âmbito administrativo, ao fornecer acesso a dados confiáveis, o Conecta Gov.PE minimiza a conferência manual de informações, diminuindo a incidência de erros e fraudes. Com um atendimento mais rápido e seguro, o Estado reduz o esforço operacional e gera uma significativa economia de recursos públicos.
            </p>
            <p style={{ fontSize:13.5, color:C.textSec, lineHeight:1.7 }}>
              A governança do projeto é centralizada na ATI-PE (Agência Estadual de Tecnologia da Informação), que disponibiliza um catálogo unificado de APIs, processos simplificados para solicitação de acesso e documentação técnica de apoio. Todo esse suporte garante conformidade técnica e jurídica, com rigorosa observância à Lei Geral de Proteção de Dados (LGPD), consolidando a transformação digital e o aprimoramento contínuo dos serviços prestados à sociedade.
            </p>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── FAQ ─────────────────────────────────────────────────────── */
const FAQ_ITEMS = [
  'O que é uma API?',
  'Quais conjuntos de dados estão disponíveis no Conecta Gov.PE?',
  'Quem pode utilizar o Conecta Gov.PE?',
  'Quais são os requisitos para a adesão?',
  'Como posso acessar as APIs disponíveis?',
  'Como faço para disponibilizar uma API no portal?',
  'O acesso às APIs tem algum custo?',
];

function FaqItem({ question }) {
  const [open, setOpen] = React.useState(false);
  return (
    <div style={{
      border:`1px solid ${C.divider}`, borderRadius:8, overflow:'hidden',
      marginBottom:8, background:C.white,
    }}>
      <button onClick={()=>setOpen(o=>!o)} style={{
        width:'100%', display:'flex', justifyContent:'space-between', alignItems:'center',
        padding:'16px 20px', background:'none', border:'none', cursor:'pointer',
        textAlign:'left',
      }}>
        <span style={{ fontSize:14, fontWeight:600, color:C.text }}>{question}</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={C.brand} strokeWidth="2.5" strokeLinecap="round"
          style={{ flexShrink:0, transform: open?'rotate(180deg)':'none', transition:'transform 0.2s' }}>
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
      {open && (
        <div style={{ padding:'0 20px 16px', fontSize:13.5, color:C.textSec, lineHeight:1.7 }}>
          Entre em contato com a equipe do Conecta Gov.PE pelo e-mail <strong>gestao.conecta.pe@ati.pe.gov.br</strong> para mais informações sobre esta questão.
        </div>
      )}
    </div>
  );
}

function Faq() {
  return (
    <div style={{ background:C.bg, padding:'48px 24px' }}>
      <div style={{ maxWidth:900, margin:'0 auto' }}>
        <h2 style={{ fontSize:24, fontWeight:700, color:C.text, marginBottom:8 }}>Perguntas frequentes</h2>
        <p style={{ fontSize:13.5, color:C.textSec, marginBottom:28, lineHeight:1.6 }}>
          Separamos as perguntas mais frequentes relacionadas ao programa. Caso sua resposta não esteja suficiente, entre em contato com o e-mail: <strong>gestao.conecta.pe@ati.pe.gov.br</strong>
        </p>
        {FAQ_ITEMS.map((q,i)=><FaqItem key={i} question={q}/>)}
      </div>
    </div>
  );
}

    'Assinar o Termo de Responsabilidade em conformidade com a LGPD.',
    'Após a aprovação, as credenciais de acesso serão disponibilizadas.',
    'Realizar a integração com a API e utilizar os dados compartilhados na solução autorizada.',
  ];

  const SectionHeader = ({ title }) => (
    <div style={{ background:'#EEF1F6', padding:'9px 16px', borderBottom:`1px solid ${C.divider}` }}>
      <span style={{ fontSize:13, fontWeight:600, color:C.text }}>{title}</span>

  );

  const SectionBody = ({ children }) => (
    <div style={{ background:C.white, padding:'12px 16px', fontSize:13, color:C.brand, lineHeight:1.75 }}>
      {children}
    </div>
  );

  const operacoes = (api.operacoes||'').split('\n').filter(Boolean);
  const sistemas = (api.baseSistema||'').split('\n').filter(Boolean);

  // Parse payload fields from detalhamento
  const detalheLines = (api.detalhamento||'').split('.').map(s=>s.trim()).filter(Boolean);

  return (
    <div style={{ background:C.bg, padding:'20px 32px', flex:1 }}>
      <div style={{ maxWidth:980, margin:'0 auto' }}>

        {/* Back button */}
        <button onClick={onBack} style={{
          display:'inline-flex', alignItems:'center', gap:6, height:30,
          padding:'0 12px', borderRadius:5, border:`1px solid ${C.border}`,
          background:C.white, color:C.text, fontSize:12, cursor:'pointer', marginBottom:18,
        }}>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
            <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
          </svg>
          Voltar ao catálogo
        </button>

        {/* Page header */}
        <div style={{ marginBottom:20 }}>
          <h1 style={{ fontSize:26, fontWeight:700, color:C.brand, marginBottom:3, letterSpacing:'-0.2px' }}>{api.nome}</h1>
          <div style={{ fontSize:13, color:C.textSec, marginBottom:1 }}>{orgao?.name} ({orgao?.short})</div>
          <div style={{ fontSize:13, color:C.textSec, marginBottom:10 }}>Versão {api.versao} • Atualizado em {api.atualizado}</div>
          <p style={{ fontSize:13.5, color:C.brand, lineHeight:1.6, maxWidth:720, marginBottom:16 }}>{api.descricao}</p>
          <button style={{
            height:38, padding:'0 20px', borderRadius:5, background:C.brand,
            color:'#fff', fontSize:14, fontWeight:600, border:'none', cursor:'pointer',
          }}>
            Solicitar API
          </button>
        </div>

        {/* Sections table */}
        <div style={{ border:`1px solid ${C.divider}`, borderRadius:8, overflow:'hidden' }}>

          {/* Principais Operações */}
          <div style={{ borderBottom:`1px solid ${C.divider}` }}>
            <SectionHeader title="Principais Operações"/>
            <SectionBody>
              {operacoes.map((op,i) => {
                const method = op.match(/^(GET|POST|PUT|PATCH|DELETE)/)?.[1];
                const rest = op.replace(/^(GET|POST|PUT|PATCH|DELETE)\s*/,'');
                const [endpoint, desc] = rest.split('—').map(s=>s.trim());
                return (
                  <div key={i} style={{ marginBottom: i < operacoes.length-1 ? 6 : 0 }}>
                    {method
                      ? <>{method === 'GET' ? 'Consulta' : method === 'POST' ? 'Criação' : method}: <code style={{ fontSize:12.5, background:'#F0F3F8', padding:'1px 5px', borderRadius:3 }}>{endpoint}</code>{desc ? ` — ${desc.toLowerCase()}` : ''}</>
                      : op
                    }
                  </div>
                );
              })}
            </SectionBody>
          </div>

          {/* Base/Sistemas de Origem */}
          <div style={{ borderBottom:`1px solid ${C.divider}` }}>
            <SectionHeader title="Base/Sistemas de Origem"/>
            <SectionBody>
              {sistemas.map((s,i)=>(
                <div key={i} style={{ marginBottom: i < sistemas.length-1 ? 4 : 0 }}>
                  • {s}
                </div>
              ))}
            </SectionBody>
          </div>

          {/* Como acessar a API */}
          <div style={{ borderBottom:`1px solid ${C.divider}` }}>
            <SectionHeader title="Como acessar a API"/>
            <SectionBody>
              {accessSteps.map((s,i)=>(
                <div key={i} style={{ marginBottom: i < accessSteps.length-1 ? 4 : 0 }}>
                  • {s}
                </div>
              ))}
            </SectionBody>
          </div>

          {/* Bottom row: Detalhamento Técnico + Contatos */}
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr' }}>
            <div style={{ borderRight:`1px solid ${C.divider}` }}>
              <SectionHeader title="Detalhamento Técnico"/>
              <SectionBody>
                <div style={{ marginBottom:4 }}>
                  <strong style={{ color:C.text }}>Protocolo:</strong> REST/JSON
                </div>
                <div style={{ marginBottom:10 }}>
                  <strong style={{ color:C.text }}>IP Fixo:</strong> Obrigatório
                </div>
                <div style={{ marginBottom:6 }}>
                  <strong style={{ color:C.text }}>Campos Retornados (Payload)</strong>
                </div>
                {detalheLines.map((line,i)=>{
                  const colonIdx = line.indexOf(':');
                  if(colonIdx > 0 && colonIdx < 30) {
                    const key = line.slice(0,colonIdx).trim();
                    const val = line.slice(colonIdx+1).trim();
                    return (
                      <div key={i} style={{ marginBottom:4 }}>
                        <strong style={{ color:C.text }}>{key}:</strong> {val}
                      </div>
                    );
                  }
                  return <div key={i} style={{ marginBottom:4 }}>{line}.</div>;
                })}
              </SectionBody>
            </div>
            <div>
              <SectionHeader title="Contatos"/>
              <SectionBody>
                {api.contatos?.length > 0
                  ? api.contatos.map((c,i)=>(
                    <div key={i} style={{ marginBottom:8 }}>
                      <div style={{ fontWeight:600, color:C.text, marginBottom:2 }}>{c.nome} (Tecnologia)</div>
                      <div>{c.email}</div>
                    </div>
                  ))
                  : <div>gestao.conecta.pe@ati.pe.gov.br</div>
                }
              </SectionBody>
            </div>
          </div>

        </div>
      </div>
    </div>
  );
}

        <div style={{ background:C.white, border:`1px solid ${C.divider}`, borderRadius:12, padding:'28px 32px' }}>

              O <strong style={{ color:C.text }}>Framework Técnico de Interoperabilidade</strong> estabelece os princípios, diretrizes e padrões tecnológicos fundamentais para a integração de sistemas e o compartilhamento seguro de dados na administração pública do Estado de Pernambuco. Alinhado a normativas nacionais como a Infraestrutura Nacional de Dados (IND) e a Lei Geral de Proteção de Dados (LGPD), o framework institui o uso prioritário de APIs REST e padrões abertos (como JSON e OpenAPI 3), promovendo a "segurança por design" e um modelo tecnológico distribuído inspirado na tecnologia estoniana X-Road. Essa infraestrutura é operacionalizada através da Plataforma de Governo Digital (PGD) e do portal Conecta Gov.PE, visando garantir a escalabilidade, a rastreabilidade das informações e uma prestação de serviços públicos mais integrada e centrada no cidadão.

/* ── App ─────────────────────────────────────────────────────── */
function App() {
  const [page, setPage] = React.useState('Início');
  const [showAdmin, setShowAdmin] = React.useState(false);
  const [detailApi, setDetailApi] = React.useState(null);

  const handleSelectApi = (api) => { setDetailApi(api); setPage('__detail__'); };
  const handleBackFromDetail = () => { setDetailApi(null); setPage('Catálogo de APIs'); };

  const pageContent = {
    'Início': (<><Hero onNav={setPage}/><Sobre/><Faq/></>),
    'Como Acessar APIs': <ComoAcessar onNav={setPage}/>,
    'Catálogo de APIs': <CatalogPage onSelectApi={handleSelectApi}/>,
    'Interoperabilidade': <Interoperabilidade/>,
    'Quem somos': <QuemSomos/>,
    '__detail__': <DetailPage api={detailApi} onBack={handleBackFromDetail}/>,
  };

  return (
    <div style={{ minHeight:'100vh', display:'flex', flexDirection:'column' }}>
      <GovBar/>
      <Header activePage={page} onNav={setPage} onAdminClick={()=>setShowAdmin(true)}/>
      <main style={{ flex:1, display:'flex', flexDirection:'column' }}>
        {pageContent[page]}
      </main>
      <Footer/>
      {showAdmin && <AdminModal onClose={()=>setShowAdmin(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
