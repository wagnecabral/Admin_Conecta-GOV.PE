<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Conecta Gov.PE</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body, #root { min-height:100%; }
body { font-family:'Inter',sans-serif; background:#F4F5F7; color:#28272C; }
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-thumb { background:#CED2D7; border-radius:3px; }
button, input { font-family:'Inter',sans-serif; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const C = {
  brand:'#0034B7', brandHover:'#337FFF', brandDark:'#001A7A',
  brandLight:'#E6F3FF', brandBorder:'#99C6FF',
  text:'#28272C', textSec:'#494C57',
  border:'#CED2D7', divider:'#E7E9EB',
  bg:'#F4F5F7', white:'#FFFFFF',
  gold:'#FFCD37',
  success:'#2B6418', successBg:'#EAFBD7', successBorder:'#86D562',
  danger:'#AC1010', dangerBg:'#FFE4E4', dangerBorder:'#E45F5F',
  warning:'#B77706', warningBg:'#FFF6CE',
};

/* ── GovBar ───────────────────────────────────────────────── */
function GovBar() {
  return (
    <div style={{ background:'#001A7A', height:32, display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0 24px' }}>
      <div style={{ display:'flex', alignItems:'center', gap:7 }}>
        <span style={{ color:'#FFCD37', fontSize:14 }}>★</span>
        <span style={{ color:'#F8FAFC', fontSize:12, fontWeight:500 }}>Governo de Pernambuco</span>
      </div>
      <div style={{ display:'flex', alignItems:'center', gap:10 }}>
        {['A-','A','A+'].map(t=>(
          <span key={t} style={{ color:'#F8FAFC', fontSize:12, fontWeight:700, cursor:'pointer', padding:'0 2px' }}>{t}</span>
        ))}
      </div>
    </div>
  );
}

/* ── Header ──────────────────────────────────────────────── */
function Header({ activePage, onNav, onAdminClick }) {
  const navItems = ['Início','Como Acessar APIs','Catálogo de APIs','Interoperabilidade','Quem somos'];
  return (
    <div style={{ background:'#FFFFFF', padding:'0 24px', display:'flex', alignItems:'center', justifyContent:'space-between', height:72, borderBottom:'1px solid #E7E9EB' }}>
      <div style={{ display:'flex', alignItems:'center', gap:14 }}>
        <img src="../assets/ati_logo.png" alt="ATI" style={{ height:44, width:'auto', objectFit:'contain' }} onError={e=>e.target.style.display='none'} />
        <div style={{ width:1, height:36, background:'#E7E9EB' }}/>
        <img src="../assets/Brasao.png" alt="Brasão de Pernambuco" style={{ height:44, width:'auto', objectFit:'contain' }} onError={e=>e.target.style.display='none'} />
        <img src="../assets/Governo.png" alt="Governo de Pernambuco" style={{ height:36, width:'auto', objectFit:'contain' }} onError={e=>e.target.style.display='none'} />
      </div>
      <nav style={{ display:'flex', gap:0, alignItems:'stretch', height:72 }}>
        {navItems.map(item => {
          const isActive = activePage === item;
          return (
            <div key={item} onClick={()=>onNav(item)} style={{ padding:'0 16px', height:72, display:'flex', alignItems:'center', fontSize:13, fontWeight:isActive?600:400, color:isActive?'#0034B7':'#28272C', borderBottom:isActive?'3px solid #0034B7':'3px solid transparent', cursor:'pointer', whiteSpace:'nowrap', transition:'all 0.15s' }}
              onMouseEnter={e=>{ if(!isActive){ e.currentTarget.style.color='#0034B7'; e.currentTarget.style.borderBottomColor='rgba(0,52,183,0.3)'; }}}
              onMouseLeave={e=>{ if(!isActive){ e.currentTarget.style.color='#28272C'; e.currentTarget.style.borderBottomColor='transparent'; }}}
            >{item}</div>
          );
        })}
      </nav>
      <div onClick={onAdminClick} style={{ padding:'0 16px', height:72, display:'flex', alignItems:'center', fontSize:13, fontWeight:400, color:'#28272C', borderBottom:'3px solid transparent', cursor:'pointer', whiteSpace:'nowrap', transition:'all 0.15s' }}
        onMouseEnter={e=>{ e.currentTarget.style.color='#0034B7'; e.currentTarget.style.borderBottomColor='rgba(0,52,183,0.3)'; }}
        onMouseLeave={e=>{ e.currentTarget.style.color='#28272C'; e.currentTarget.style.borderBottomColor='transparent'; }}
      >Acessar</div>
    </div>
  );
}

/* ── Hero ────────────────────────────────────────────────── */
function Hero({ onNav }) {
  return (
    <div style={{ background:C.bg, padding:'32px 24px 40px', display:'flex', justifyContent:'center' }}>
      <div style={{ background:`linear-gradient(160deg, #001A7A 0%, #0034B7 60%, #0A3FAA 100%)`, borderRadius:16, padding:'60px 56px 64px', maxWidth:900, width:'100%', position:'relative', overflow:'hidden' }}>
        <div style={{ position:'absolute', right:-60, top:-60, width:280, height:280, borderRadius:'50%', background:'rgba(255,255,255,0.04)', pointerEvents:'none' }}/>
        <div style={{ position:'absolute', right:40, bottom:-80, width:200, height:200, borderRadius:'50%', background:'rgba(255,255,255,0.03)', pointerEvents:'none' }}/>
        <h1 style={{ fontSize:40, fontWeight:700, color:'#F8FAFC', marginBottom:12, letterSpacing:'-0.5px', lineHeight:1.15 }}>Conecta Gov.PE</h1>
        <p style={{ fontSize:17, fontWeight:600, color:'rgba(248,250,252,0.9)', marginBottom:16 }}>Conectando Soluções para um Governo Integrado</p>
        <p style={{ fontSize:14, color:'rgba(248,250,252,0.75)', lineHeight:1.6, maxWidth:480, marginBottom:32 }}>Plataforma estadual que facilita a interoperabilidade entre sistemas de informação e o compartilhamento seguro de dados através de APIs.</p>
        <div style={{ display:'flex', gap:12 }}>
          <button onClick={()=>onNav('Como Acessar APIs')} style={{ height:42, padding:'0 22px', borderRadius:5, background:C.brand, color:'#fff', fontSize:14, fontWeight:600, border:'none', cursor:'pointer' }}>Como acessar APIs</button>
          <button onClick={()=>onNav('Catálogo de APIs')} style={{ height:42, padding:'0 22px', borderRadius:5, background:'transparent', color:'#F8FAFC', fontSize:14, fontWeight:600, border:'1.5px solid rgba(248,250,252,0.5)', cursor:'pointer' }}>Consultar APIs</button>
        </div>
      </div>
    </div>
  );
}

/* ── Sobre ───────────────────────────────────────────────── */
function Sobre() {
  return (
    <div style={{ background:C.white, padding:'48px 24px' }}>
      <div style={{ maxWidth:900, margin:'0 auto' }}>
        <h2 style={{ fontSize:24, fontWeight:700, color:C.text, marginBottom:24 }}>Sobre o Conecta Gov.PE</h2>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:40 }}>
          <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
            <p style={{ fontSize:13.5, color:C.textSec, lineHeight:1.7 }}>O Conecta Gov.PE é a plataforma estadual que promove a troca segura de informações entre sistemas. Inspirada no modelo federal do Conecta gov.br, a solução foca no princípio de que o governo não deve solicitar ao cidadão informações que o próprio Estado já possua.</p>
            <p style={{ fontSize:13.5, color:C.textSec, lineHeight:1.7 }}>Nesse contexto, o cidadão é o principal beneficiário, uma vez que a plataforma viabiliza jornadas de serviço unificadas e simplifica a interação com o Estado. Ao eliminar a necessidade de navegar por múltiplos portais ou de reapresentar documentos de forma redundante, as demandas passam a ser resolvidas em um ponto de contato mais ágil e inteligente.</p>
          </div>
          <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
            <p style={{ fontSize:13.5, color:C.textSec, lineHeight:1.7 }}>No âmbito administrativo, ao fornecer acesso a dados confiáveis, o Conecta Gov.PE minimiza a conferência manual de informações, diminuindo a incidência de erros e fraudes.</p>
            <p style={{ fontSize:13.5, color:C.textSec, lineHeight:1.7 }}>A governança do projeto é centralizada na ATI-PE (Agência Estadual de Tecnologia da Informação), que disponibiliza um catálogo unificado de APIs, processos simplificados para solicitação de acesso e documentação técnica de apoio. Todo esse suporte garante conformidade técnica e jurídica, com rigorosa observância à Lei Geral de Proteção de Dados (LGPD).</p>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── FAQ ─────────────────────────────────────────────────── */
const FAQ_ITEMS = [
  'O que é uma API?','Quais conjuntos de dados estão disponíveis no Conecta Gov.PE?',
  'Quem pode utilizar o Conecta Gov.PE?','Quais são os requisitos para a adesão?',
  'Como posso acessar as APIs disponíveis?','Como faço para disponibilizar uma API no portal?',
  'O acesso às APIs tem algum custo?',
];

function FaqItem({ question }) {
  const [open, setOpen] = React.useState(false);
  return (
    <div style={{ border:`1px solid ${C.divider}`, borderRadius:8, overflow:'hidden', marginBottom:8, background:C.white }}>
      <button onClick={()=>setOpen(o=>!o)} style={{ width:'100%', display:'flex', justifyContent:'space-between', alignItems:'center', padding:'16px 20px', background:'none', border:'none', cursor:'pointer', textAlign:'left' }}>
        <span style={{ fontSize:14, fontWeight:600, color:C.text }}>{question}</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={C.brand} strokeWidth="2.5" strokeLinecap="round" style={{ flexShrink:0, transform:open?'rotate(180deg)':'none', transition:'transform 0.2s' }}><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      {open && (<div style={{ padding:'0 20px 16px', fontSize:13.5, color:C.textSec, lineHeight:1.7 }}>Entre em contato com a equipe pelo e-mail <strong>gestao.conecta.pe@ati.pe.gov.br</strong> para mais informações.</div>)}
    </div>
  );
}

function Faq() {
  return (
    <div style={{ background:C.bg, padding:'48px 24px' }}>
      <div style={{ maxWidth:900, margin:'0 auto' }}>
        <h2 style={{ fontSize:24, fontWeight:700, color:C.text, marginBottom:8 }}>Perguntas frequentes</h2>
        <p style={{ fontSize:13.5, color:C.textSec, marginBottom:28, lineHeight:1.6 }}>Separamos as perguntas mais frequentes. Caso sua resposta não esteja aqui, entre em contato: <strong>gestao.conecta.pe@ati.pe.gov.br</strong></p>
        {FAQ_ITEMS.map((q,i)=><FaqItem key={i} question={q}/>)}
      </div>
    </div>
  );
}

/* ── Footer ──────────────────────────────────────────────── */
function Footer() {
  return (
    <div style={{ background:'#0034B7', color:'#F8FAFC', padding:'40px 24px 0' }}>
      <div style={{ maxWidth:900, margin:'0 auto' }}>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:48, paddingBottom:32 }}>
          <div>
            <div style={{ fontSize:15, fontWeight:700, color:'#F8FAFC', marginBottom:14 }}>Portal Conecta Gov.PE</div>
            <p style={{ fontSize:13, color:'rgba(248,250,252,0.65)', lineHeight:1.7, maxWidth:340 }}>Estrutura digital baseada no Padrão Pernambuco Digital para oferecer uma experiência mais consistente, acessível e integrada aos serviços do Estado.</p>
          </div>
          <div>
            <div style={{ fontSize:14, fontWeight:600, color:'#F8FAFC', marginBottom:12 }}>Contato institucional</div>
            <div style={{ fontSize:13, color:'rgba(248,250,252,0.65)', lineHeight:1.85 }}>
              <div>gestao.conecta.pe@ati.pe.gov.br</div>
              <div>(81) 3181-8121</div>
              <div>Av. Rio Capibaribe, 147 · São José · CEP: 50.020-080 · Recife-PE</div>
              <div>Horário: 8h às 12h e 13h às 17h</div>
            </div>
          </div>
        </div>
        <div style={{ borderTop:'1px solid rgba(248,250,252,0.2)', padding:'20px 0', display:'flex', alignItems:'center', justifyContent:'flex-end' }}>
          <div style={{ display:'flex', alignItems:'center', gap:20 }}>
            <img src="../assets/ati_logo.png" alt="ATI" style={{ height:48, width:'auto', objectFit:'contain', filter:'brightness(0) invert(1)' }} onError={e=>e.target.style.display='none'} />
            <div style={{ width:1, height:40, background:'rgba(248,250,252,0.25)' }}/>
            <img src="../assets/Brasao.png" alt="Brasão" style={{ height:48, width:'auto', objectFit:'contain', filter:'brightness(0) invert(1)' }} onError={e=>e.target.style.display='none'} />
            <img src="../assets/Governo.png" alt="Governo PE" style={{ height:40, width:'auto', objectFit:'contain', filter:'brightness(0) invert(1)' }} onError={e=>e.target.style.display='none'} />
            <div style={{ width:1, height:40, background:'rgba(248,250,252,0.25)' }}/>
            <img src="../assets/liga_digital.png" alt="Liga Digital" style={{ height:40, width:'auto', objectFit:'contain', filter:'brightness(0) invert(1)' }} onError={e=>e.target.style.display='none'} />
          </div>
        </div>
        <div style={{ borderTop:'1px solid rgba(248,250,252,0.08)', padding:'14px 0 18px' }}>
          <span style={{ fontSize:12, color:'rgba(248,250,252,0.35)' }}>Todos os direitos reservados | ATI – Agência Estadual de Tecnologia da Informação</span>
        </div>
      </div>
    </div>
  );
}

/* ── Catálogo ────────────────────────────────────────────── */
const ORGAOS_CAT = {
  '1':{ short:'ATI',    name:'Agência Estadual de Tecnologia da Informação' },
  '2':{ short:'SEFAZ',  name:'Secretaria da Fazenda' },
  '3':{ short:'SEPLAG', name:'Secretaria de Planejamento e Gestão' },
  '4':{ short:'SES',    name:'Secretaria de Saúde' },
  '5':{ short:'SEE',    name:'Secretaria de Educação' },
  '6':{ short:'SEDS',   name:'Secretaria de Desenvolvimento Social' },
};
const APIS_CAT = [
  { id:1, nome:'Catálogo de Serviços', orgaoId:'1', versao:'v2.1', status:'Ativo', descricao:'API pública de catálogo de serviços do estado de Pernambuco.', operacoes:'GET /servicos — lista todos os serviços\nGET /servicos/{id} — detalhe do serviço', baseSistema:'ATI — Portal de Serviços PE', comoAcessar:'Solicitar credenciais via portal ATI. Autenticar via Bearer Token.', detalhamento:'Protocolo HTTPS. Retorna JSON com campos: id, nome, orgao, descricao, status.', contatos:[{nome:'Time ATI', email:'api@ati.pe.gov.br'}], categoria:'Serviços', atualizado:'10/04/2025' },
  { id:2, nome:'Consulta de CPF', orgaoId:'2', versao:'v1.0', status:'Ativo', descricao:'Consulta de dados cadastrais de contribuintes via CPF.', operacoes:'GET /cpf/{numero} — retorna dados do cidadão', baseSistema:'SEFAZ — Cadastro Fiscal', comoAcessar:'Solicitar acesso via SEFAZ Digital. Requer convênio assinado.', detalhamento:'Protocolo HTTPS. IP fixo obrigatório. Retorna: nome, situação, data nascimento.', contatos:[{nome:'SEFAZ Digital', email:'digital@sefaz.pe.gov.br'}], categoria:'Fiscal', atualizado:'03/02/2025' },
  { id:4, nome:'Boletim de Ocorrência', orgaoId:'3', versao:'v3.0', status:'Ativo', descricao:'Registro e consulta de boletins de ocorrência policial.', operacoes:'POST /bo — registra BO\nGET /bo/{protocolo} — consulta BO', baseSistema:'SEPLAG — Segurança Pública', comoAcessar:'Credenciais fornecidas pela SEPLAG mediante solicitação formal.', detalhamento:'HTTPS. Retorna: protocolo, data, tipo, status, delegacia.', contatos:[{nome:'SEPLAG TI', email:'ti@seplag.pe.gov.br'}], categoria:'Segurança', atualizado:'18/04/2025' },
  { id:5, nome:'Emissão de Certidões', orgaoId:'2', versao:'v1.5', status:'Ativo', descricao:'Emissão de certidões fiscais e negativas de débitos estaduais.', operacoes:'GET /certidoes/negativa — emite CND\nGET /certidoes/debitos — lista débitos', baseSistema:'SEFAZ — Sistema Tributário', comoAcessar:'Integração via API Key. Solicitar chave no portal SEFAZ.', detalhamento:'HTTPS. Retorna PDF ou JSON: contribuinte, situação, validade.', contatos:[{nome:'SEFAZ', email:'sefaz@sefaz.pe.gov.br'}], categoria:'Fiscal', atualizado:'05/01/2025' },
  { id:8, nome:'Programas Habitacionais', orgaoId:'6', versao:'v1.1', status:'Ativo', descricao:'Inscrições e consultas em programas habitacionais do estado.', operacoes:'POST /inscricoes — realiza inscrição\nGET /inscricoes/{cpf} — consulta', baseSistema:'SEDS — Sistema Habitacional', comoAcessar:'API Key fornecida pela SEDS mediante solicitação.', detalhamento:'HTTPS. Retorna: inscrição, programa, situação, posição na fila.', contatos:[{nome:'SEDS TI', email:'ti@seds.pe.gov.br'}], categoria:'Social', atualizado:'20/02/2025' },
];
const CAT_COLORS = {
  'Serviços':  { bg:'#E6F3FF', color:'#0034B7', border:'#99C6FF' },
  'Fiscal':    { bg:'#FFF6CE', color:'#B77706', border:'#FFB70C' },
  'Segurança': { bg:'#FFE4E4', color:'#AC1010', border:'#E45F5F' },
  'Social':    { bg:'#EAFBD7', color:'#2B6418', border:'#86D562' },
};

function DetailPage({ api, onBack }) {
  const orgao = ORGAOS_CAT[api.orgaoId];
  const accessSteps = ['Selecionar a API desejada no Catálogo do Portal Conecta GOV.PE.','No Portal de Serviços (PE GOV), preencher o formulário de requisição e anexar a documentação técnica necessária.','A solicitação será validada pelo órgão cedente da API e pela equipe do Conecta GOV.PE.','Assinar o Termo de Responsabilidade em conformidade com a LGPD.','Após a aprovação, as credenciais de acesso serão disponibilizadas.','Realizar a integração com a API e utilizar os dados compartilhados na solução autorizada.'];
  const SectionHeader = ({ title }) => (<div style={{ background:'#EEF1F6', padding:'9px 16px', borderBottom:`1px solid ${C.divider}` }}><span style={{ fontSize:13, fontWeight:600, color:C.text }}>{title}</span></div>);
  const SectionBody = ({ children }) => (<div style={{ background:C.white, padding:'12px 16px', fontSize:13, color:C.brand, lineHeight:1.75 }}>{children}</div>);
  const operacoes = (api.operacoes||'').split('\n').filter(Boolean);
  const sistemas = (api.baseSistema||'').split('\n').filter(Boolean);
  const detalheLines = (api.detalhamento||'').split('.').map(s=>s.trim()).filter(Boolean);
  return (
    <div style={{ background:C.bg, padding:'20px 32px', flex:1 }}>
      <div style={{ maxWidth:980, margin:'0 auto' }}>
        <button onClick={onBack} style={{ display:'inline-flex', alignItems:'center', gap:6, height:30, padding:'0 12px', borderRadius:5, border:`1px solid ${C.border}`, background:C.white, color:C.text, fontSize:12, cursor:'pointer', marginBottom:18 }}>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          Voltar ao catálogo
        </button>
        <div style={{ marginBottom:20 }}>
          <h1 style={{ fontSize:26, fontWeight:700, color:C.brand, marginBottom:3, letterSpacing:'-0.2px' }}>{api.nome}</h1>
          <div style={{ fontSize:13, color:C.textSec, marginBottom:1 }}>{orgao?.name} ({orgao?.short})</div>
          <div style={{ fontSize:13, color:C.textSec, marginBottom:10 }}>Versão {api.versao} • Atualizado em {api.atualizado}</div>
          <p style={{ fontSize:13.5, color:C.brand, lineHeight:1.6, maxWidth:720, marginBottom:16 }}>{api.descricao}</p>
          <button style={{ height:38, padding:'0 20px', borderRadius:5, background:C.brand, color:'#fff', fontSize:14, fontWeight:600, border:'none', cursor:'pointer' }}>Solicitar API</button>
        </div>
        <div style={{ border:`1px solid ${C.divider}`, borderRadius:8, overflow:'hidden' }}>
          <div style={{ borderBottom:`1px solid ${C.divider}` }}>
            <SectionHeader title="Principais Operações"/>
            <SectionBody>{operacoes.map((op,i)=>{ const method=op.match(/^(GET|POST|PUT|PATCH|DELETE)/)?.[1]; const rest=op.replace(/^(GET|POST|PUT|PATCH|DELETE)\s*/,''); const [endpoint,desc]=rest.split('—').map(s=>s.trim()); return (<div key={i} style={{ marginBottom:i<operacoes.length-1?6:0 }}>{method?<>{method==='GET'?'Consulta':method==='POST'?'Criação':method}: <code style={{ fontSize:12.5, background:'#F0F3F8', padding:'1px 5px', borderRadius:3 }}>{endpoint}</code>{desc?` — ${desc.toLowerCase()}`:''}</>:op}</div>); })}</SectionBody>
          </div>
          <div style={{ borderBottom:`1px solid ${C.divider}` }}>
            <SectionHeader title="Base/Sistemas de Origem"/>
            <SectionBody>{sistemas.map((s,i)=>(<div key={i} style={{ marginBottom:i<sistemas.length-1?4:0 }}>• {s}</div>))}</SectionBody>
          </div>
          <div style={{ borderBottom:`1px solid ${C.divider}` }}>
            <SectionHeader title="Como acessar a API"/>
            <SectionBody>{accessSteps.map((s,i)=>(<div key={i} style={{ marginBottom:i<accessSteps.length-1?4:0 }}>• {s}</div>))}</SectionBody>
          </div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr' }}>
            <div style={{ borderRight:`1px solid ${C.divider}` }}>
              <SectionHeader title="Detalhamento Técnico"/>
              <SectionBody>
                <div style={{ marginBottom:4 }}><strong style={{ color:C.text }}>Protocolo:</strong> REST/JSON</div>
                <div style={{ marginBottom:10 }}><strong style={{ color:C.text }}>IP Fixo:</strong> Obrigatório</div>
                <div style={{ marginBottom:6 }}><strong style={{ color:C.text }}>Campos Retornados (Payload)</strong></div>
                {detalheLines.map((line,i)=>{ const colonIdx=line.indexOf(':'); if(colonIdx>0&&colonIdx<30){ const key=line.slice(0,colonIdx).trim(); const val=line.slice(colonIdx+1).trim(); return(<div key={i} style={{ marginBottom:4 }}><strong style={{ color:C.text }}>{key}:</strong> {val}</div>); } return <div key={i} style={{ marginBottom:4 }}>{line}.</div>; })}
              </SectionBody>
            </div>
            <div>
              <SectionHeader title="Contatos"/>

/* ════════════════════════════════════════════════════════════
   SSO MODAL — substitui o AdminModal com login/senha
   Fluxo: Acessar → Modal SSO → Expresso (simulado) → Backoffice ou Negado
   ══════════════════════════════════════════════════════════ */

/* Dados simulados de usuários pré-cadastrados (CPFs autorizados) */
const USUARIOS_AUTORIZADOS = ['046.318.094-18','123.456.789-90','234.567.890-77'];

function SsoModal({ onClose, onAcessoNegado, onAcessoAutorizado, onGovBrAutenticado }) {
  /* Fluxo: selecionar provedor → formulário do provedor escolhido */
  const [tela, setTela] = React.useState('selecao'); /* 'selecao' | 'expresso' | 'govbr' */
  const [cpf,     setCpf]    = React.useState('');
  const [senha,   setSenha]  = React.useState('');
  const [loading, setLoading]= React.useState(false);
  const [erro,    setErro]   = React.useState('');

  const CPF_AUTORIZADOS = ['046.318.094-18','123.456.789-90','234.567.890-77'];

  const formatCpf = v => {
    const n = v.replace(/\D/g,'').slice(0,11);
    if(n.length<=3) return n;
    if(n.length<=6) return n.slice(0,3)+'.'+n.slice(3);
    if(n.length<=9) return n.slice(0,3)+'.'+n.slice(3,6)+'.'+n.slice(6);
    return n.slice(0,3)+'.'+n.slice(3,6)+'.'+n.slice(6,9)+'-'+n.slice(9);
  };

  const resetForm = () => { setCpf(''); setSenha(''); setErro(''); };

  const handleVoltar = () => { resetForm(); setTela('selecao'); };

  const handleEntrar = () => {
    if(!cpf||!senha){ setErro('Preencha CPF e senha para continuar.'); return; }
    setLoading(true); setErro('');
    setTimeout(()=>{
      setLoading(false);
      if (tela === 'govbr') {
        /* GOV.BR → área do solicitante (qualquer CPF válido) */
        if (onGovBrAutenticado) onGovBrAutenticado(cpf);
      } else {
        /* Expresso → backoffice (CPF deve estar na lista) */
        if(CPF_AUTORIZADOS.includes(cpf)) { onAcessoAutorizado(cpf); }
        else { onAcessoNegado(); }
      }
    }, 1400);
  };

  /* Estilos compartilhados do campo underline */
  const fSt = bg => ({
    width:'100%', background:'transparent', border:'none',
    borderBottom:`1.5px solid ${bg}`,
    outline:'none', fontSize:16,
    padding:'8px 0', fontFamily:'inherit',
  });

  /* ─────────────────────────────────────────────
     TELA 1 — Seleção de provedor
  ───────────────────────────────────────────── */
  if (tela === 'selecao') {
    return (
      <div style={{ position:'fixed', inset:0, background:'rgba(0,26,122,0.5)', zIndex:1000,
        display:'flex', alignItems:'center', justifyContent:'center', padding:24 }}>
        <div style={{ background:'#fff', borderRadius:12, width:'100%', maxWidth:420,
          boxShadow:'0 8px 40px rgba(0,26,122,0.22)', overflow:'hidden' }}>

          {/* Barra azul topo */}
          <div style={{ background:'#0034B7', height:5 }}/>

          {/* Conteúdo */}
          <div style={{ padding:'40px 40px 36px', textAlign:'center' }}>
            <h2 style={{ fontSize:20, fontWeight:600, color:'#28272C', marginBottom:6 }}>
              Entrar na sua conta
            </h2>
            <div style={{ height:1, background:'#E7E9EB', margin:'20px 0 28px' }}/>

            {/* Botão GOV.BR */}
            <button
              onClick={()=>{ resetForm(); setTela('govbr'); }}
              style={{ width:'100%', height:48, borderRadius:100, background:'#1351B4',
                border:'none', color:'#fff', fontSize:15, fontWeight:700,
                cursor:'pointer', marginBottom:14, display:'flex',
                alignItems:'center', justifyContent:'center', gap:8,
                transition:'background 0.2s' }}
              onMouseEnter={e=>e.currentTarget.style.background='#0C3C8A'}
              onMouseLeave={e=>e.currentTarget.style.background='#1351B4'}
            >
              Entrar com <strong>gov.br</strong>
            </button>

            {/* Botão Expresso.PE */}
            <button
              onClick={()=>{ resetForm(); setTela('expresso'); }}
              style={{ width:'100%', height:48, borderRadius:100, background:'#0034B7',
                border:'none', color:'#fff', fontSize:15, fontWeight:700,
                cursor:'pointer', display:'flex',
                alignItems:'center', justifyContent:'center', gap:8,
                transition:'background 0.2s' }}
              onMouseEnter={e=>e.currentTarget.style.background='#001A7A'}
              onMouseLeave={e=>e.currentTarget.style.background='#0034B7'}
            >
              Entrar com <strong>expresso.pe</strong>
            </button>

            {/* Voltar */}
            <div style={{ marginTop:24 }}>
              <button onClick={onClose}
                style={{ background:'none', border:'none', cursor:'pointer',
                  fontSize:12, color:'#888' }}>
                ← Voltar ao portal
              </button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  /* ─────────────────────────────────────────────
     TELA 2 — Login GOV.BR
  ───────────────────────────────────────────── */
  if (tela === 'govbr') {
    return (
      <div style={{ position:'fixed', inset:0, background:'#1351B4', zIndex:1000,
        display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:24 }}>

        {/* Logo GOV.BR tipográfico */}
        <div style={{ marginBottom:48, textAlign:'center' }}>
          <div style={{ display:'inline-flex', alignItems:'center', gap:0,
            background:'rgba(255,255,255,0.12)', borderRadius:8, padding:'8px 20px',
            border:'1px solid rgba(255,255,255,0.2)' }}>
            <span style={{ fontSize:28, fontWeight:900, color:'#fff', letterSpacing:'-1px' }}>gov</span>
            <span style={{ fontSize:28, fontWeight:900, color:'#FFCD07', letterSpacing:'-1px' }}>.br</span>
          </div>
          <div style={{ fontSize:12, color:'rgba(255,255,255,0.6)', marginTop:8, letterSpacing:'0.5px' }}>
            ACESSO À CONTA ÚNICA DO GOVERNO FEDERAL
          </div>
        </div>

        <div style={{ width:'100%', maxWidth:440 }}>
          {erro && (
            <div style={{ background:'rgba(255,255,255,0.12)', borderRadius:6, padding:'10px 14px',
              fontSize:13, color:'#FFE082', marginBottom:24, textAlign:'center' }}>
              {erro}
            </div>
          )}

          <div style={{ marginBottom:28 }}>
            <label style={{ display:'block', fontSize:14, color:'rgba(255,255,255,0.8)', marginBottom:4 }}>CPF</label>
            <input value={cpf} onChange={e=>setCpf(formatCpf(e.target.value))}
              maxLength={14}
              style={{ ...fSt('rgba(255,255,255,0.5)'), color:'#fff', caretColor:'#fff' }}
              onFocus={e=>e.target.style.borderBottomColor='#fff'}
              onBlur={e=>e.target.style.borderBottomColor='rgba(255,255,255,0.5)'}
              onKeyDown={e=>e.key==='Enter'&&handleEntrar()}
            />
          </div>

          <div style={{ marginBottom:40 }}>
            <label style={{ display:'block', fontSize:14, color:'rgba(255,255,255,0.8)', marginBottom:4 }}>Senha</label>
            <input type="password" value={senha} onChange={e=>setSenha(e.target.value)}
              style={{ ...fSt('rgba(255,255,255,0.5)'), color:'#fff', caretColor:'#fff' }}
              onFocus={e=>e.target.style.borderBottomColor='#fff'}
              onBlur={e=>e.target.style.borderBottomColor='rgba(255,255,255,0.5)'}
              onKeyDown={e=>e.key==='Enter'&&handleEntrar()}
            />
          </div>

          <button onClick={handleEntrar} disabled={loading}
            style={{ width:140, height:42, borderRadius:100,
              background: loading ? 'rgba(255,255,255,0.2)' : '#FFCD07',
              border:'none',
              color: loading ? '#fff' : '#1351B4',
              fontSize:14, fontWeight:700,
              cursor: loading ? 'not-allowed' : 'pointer',
              display:'block', margin:'0 auto',
              transition:'all 0.2s' }}>
            {loading ? '...' : 'Entrar'}
          </button>

          <div style={{ textAlign:'center', marginTop:28 }}>
            <button onClick={handleVoltar}
              style={{ background:'none', border:'none', cursor:'pointer',
                fontSize:12, color:'rgba(255,255,255,0.5)' }}>
              ← Voltar
            </button>
          </div>
        </div>
      </div>
    );
  }

    const c = statusCfg[status] || {bg:'#F1EFE8',color:'#5F5E5A',border:'#D3D1C7',dot:'#888'};

          <div style={{width:1,height:32,background:'#E7E9EB'}}/>

          <span style={{fontSize:14,fontWeight:700,color:'#001A7A'}}>Conecta Gov.PE</span>
        </div>
        {/* Usuário logado */}
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          {/* Badge GOV.BR */}
          <div style={{display:'flex',alignItems:'center',gap:6,background:'#F0F4FF',
            border:'1px solid #C7D6FF',borderRadius:100,padding:'4px 12px'}}>
            <div style={{display:'flex',alignItems:'center',gap:0,
              background:'#1351B4',borderRadius:4,padding:'2px 6px'}}>
              <span style={{fontSize:10,fontWeight:900,color:'#fff',letterSpacing:'-0.5px'}}>gov</span>
              <span style={{fontSize:10,fontWeight:900,color:'#FFCD07',letterSpacing:'-0.5px'}}>.br</span>
            </div>
            <span style={{fontSize:12,fontWeight:600,color:'#001A7A'}}>{usuario.nome.split(' ')[0]}</span>
          </div>
          <button onClick={onSair}

              display:'flex',alignItems:'center',gap:6,transition:'all 0.15s'}}

            onMouseLeave={e=>e.currentTarget.style.background='#fff'}>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#AC1010" strokeWidth="2" strokeLinecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Sair
          </button>
        </div>
      </div>

      {/* Conteúdo */}
      <div style={{flex:1,padding:'28px 24px',maxWidth:1100,width:'100%',margin:'0 auto'}}>

        {/* Saudação */}

            <h1 style={{fontSize:22,fontWeight:700,color:'#001A7A',marginBottom:3}}>
              Olá, {usuario.nome.split(' ')[0]} 👋
            </h1>
            <p style={{fontSize:13,color:'#494C57'}}>
              Acompanhe suas solicitações de acesso às APIs do Conecta Gov.PE

          </div>
          <div style={{textAlign:'right'}}>
            <div style={{display:'flex',alignItems:'center',gap:5,justifyContent:'flex-end',marginBottom:3}}>

            </div>
            <span style={{fontSize:11,color:'#888'}}>Sincronizado hoje às {sync}</span>
          </div>
        </div>

        {/* Cards KPI */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:10,marginBottom:20}}>

            {label:'Aprovadas',   valor:aprovadas, cor:'#2B6418', bg:'#EAFBD7',  border:'#86D562'},
            {label:'Em análise',  valor:analise,   cor:'#B77706', bg:'#FFF6CE',  border:'#FFE082'},
            {label:'Pendentes',   valor:pendentes, cor:'#0034B7', bg:'#E6F3FF',  border:'#99C6FF'},
            {label:'Reprovadas',  valor:reprovadas,cor:'#AC1010', bg:'#FFE4E4',  border:'#E45F5F'},

        </div>

        {(pendentes > 0 || analise > 0) && (

          </div>

              </div>
              {/* API */}

                <select value={filtroApi} onChange={e=>setFiltroApi(e.target.value)}

              </div>
              {(filtroStatus||filtroApi)&&(
                <button onClick={()=>{setFiltroStatus('');setFiltroApi('');}}

              <span style={{fontSize:11,color:'#888',marginLeft:'auto'}}>
                {filtradas.length} de {total} registro{total!==1?'s':''}

            </div>

            {filtradas.length === 0 ? (
              <div style={{padding:'48px',textAlign:'center',color:'#888',fontSize:13}}>
                Nenhuma solicitação encontrada com os filtros aplicados.

              <div style={{overflowX:'auto'}}>
                <table style={{width:'100%',borderCollapse:'collapse'}}>
                  <thead>
                    <tr>
                      {['Protocolo SEI','API solicitada','Órgão cedente','Data da solicitação','Última atualização','Status',''].map(h=>(

                          color:'#494C57',borderBottom:'1px solid #E7E9EB',background:'#F8FAFC',whiteSpace:'nowrap'}}>
                          {h}
                        </th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {filtradas.map((s)=>(
                      <tr key={s.id} style={{borderBottom:'1px solid #E7E9EB',transition:'background 0.1s'}}
                        onMouseEnter={e=>e.currentTarget.style.background='#F0F5FF'}
                        onMouseLeave={e=>e.currentTarget.style.background='#fff'}>
                        <td style={{padding:'11px 14px'}}>
                          <code style={{fontSize:11,fontFamily:'monospace',background:'#F4F5F7',
                            padding:'2px 7px',borderRadius:3,color:'#28272C'}}>{s.protocolo}</code>
                        </td>
                        <td style={{padding:'11px 14px',fontSize:13,fontWeight:600,color:'#001A7A'}}>{s.api}</td>
                        <td style={{padding:'11px 14px'}}>
                          <span style={{fontSize:11,fontWeight:600,background:'#E6F3FF',color:'#0034B7',
                            padding:'2px 8px',borderRadius:100,border:'1px solid #99C6FF'}}>
                            {s.orgaoCedente}
                          </span>
                        </td>
                        <td style={{padding:'11px 14px',fontSize:12,color:'#494C57'}}>{s.dataSolicitacao}</td>
                        <td style={{padding:'11px 14px',fontSize:12,color:'#494C57'}}>{s.dataAtualizacao}</td>
                        <td style={{padding:'11px 14px'}}><StatusBadge status={s.status}/></td>
                        <td style={{padding:'11px 14px',textAlign:'right'}}>
                          <button onClick={()=>setModalDetalhe(s)}
                            style={{height:30,padding:'0 12px',borderRadius:5,border:'1px solid #99C6FF',
                              background:'#E6F3FF',color:'#0034B7',fontSize:11,fontWeight:600,
                              cursor:'pointer',whiteSpace:'nowrap',transition:'all 0.15s'}}
                            onMouseEnter={e=>e.currentTarget.style.background='#C7DFFF'}
                            onMouseLeave={e=>e.currentTarget.style.background='#E6F3FF'}>
                            Ver detalhes
                          </button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}

            {/* Rodapé informativo */}
            <div style={{padding:'10px 16px',borderTop:'1px solid #E7E9EB',background:'#F8FAFC',
              display:'flex',alignItems:'center',gap:8}}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#888" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
              <span style={{fontSize:11,color:'#888'}}>
                Dados somente leitura · Sincronizados com o SEI-PE · As solicitações são gerenciadas exclusivamente no SEI-PE
              </span>
            </div>
          </div>
        )}

        {/* ── ABA: APIs COM ACESSO APROVADO ── */}
        {abaAtiva === 'aprovadas' && (
          <div>
            {apisAprovadas.length === 0 ? (
              <div style={{background:'#fff',border:'1px solid #E7E9EB',borderRadius:8,
                padding:'48px',textAlign:'center'}}>
                <div style={{fontSize:40,marginBottom:12}}>🔒</div>
                <div style={{fontSize:16,fontWeight:600,color:'#28272C',marginBottom:6}}>Nenhuma API aprovada ainda</div>
                <div style={{fontSize:13,color:'#888',maxWidth:400,margin:'0 auto'}}>
                  Suas solicitações serão exibidas aqui após aprovação pelo órgão cedente.
                </div>
              </div>
            ) : (
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(320px,1fr))',gap:14}}>
                {apisAprovadas.map(s=>(
                  <div key={s.id}
                    style={{background:'#fff',border:'1.5px solid #86D562',borderRadius:10,
                      padding:'20px',boxShadow:'0 2px 12px rgba(43,100,24,0.08)',
                      transition:'box-shadow 0.15s'}}
                    onMouseEnter={e=>e.currentTarget.style.boxShadow='0 6px 24px rgba(43,100,24,0.15)'}
                    onMouseLeave={e=>e.currentTarget.style.boxShadow='0 2px 12px rgba(43,100,24,0.08)'}>
                    {/* Topo do card */}
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
                      <div>
                        <div style={{fontSize:15,fontWeight:700,color:'#001A7A',marginBottom:3}}>{s.api}</div>
                        <span style={{fontSize:11,fontWeight:600,background:'#E6F3FF',color:'#0034B7',
                          padding:'2px 8px',borderRadius:100,border:'1px solid #99C6FF'}}>
                          {s.orgaoCedente}
                        </span>
                      </div>
                      <span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'3px 10px',
                        borderRadius:100,fontSize:11,fontWeight:700,background:'#EAFBD7',
                        color:'#2B6418',border:'1px solid #86D562',flexShrink:0}}>
                        <span style={{width:6,height:6,borderRadius:'50%',background:'#2B6418'}}/>
                        Acesso ativo
                      </span>
                    </div>
                    {/* Detalhe */}
                    <div style={{background:'#F4FAF0',border:'1px solid #C2EEAC',borderRadius:6,

                      {s.detalhe}
                    </div>
                    {/* Infos */}
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginBottom:12}}>
                      {[
                        ['Protocolo SEI', s.protocolo.replace('SEI-PE ','')],
                        ['Data da aprovação', s.dataAtualizacao],
                        ['Responsável', s.responsavel],
                      ].map(([k,v])=>(
                        <div key={k} style={{background:'#F8FAFC',border:'1px solid #E7E9EB',
                          borderRadius:5,padding:'7px 10px'}}>
                          <div style={{fontSize:10,color:'#888',marginBottom:2}}>{k}</div>
                          <div style={{fontSize:12,fontWeight:500,color:'#28272C',
                            fontFamily:k==='Protocolo SEI'?'monospace':'inherit'}}>{v}</div>
                        </div>
                      ))}
                    </div>
                    {/* Ação */}
                    <button
                      onClick={()=>setModalDetalhe(s)}
                      style={{width:'100%',height:34,borderRadius:6,
                        border:'1.5px solid #0034B7',background:'#fff',
                        color:'#0034B7',fontSize:12,fontWeight:600,cursor:'pointer',
                        transition:'all 0.15s'}}
                      onMouseEnter={e=>e.currentTarget.style.background='#E6F3FF'}
                      onMouseLeave={e=>e.currentTarget.style.background='#fff'}>
                      Ver detalhes da solicitação
                    </button>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}
      </div>

      {/* Modal Detalhe */}
      {modalDetalhe && (
        <div style={{position:'fixed',inset:0,background:'rgba(0,26,122,0.4)',zIndex:1000,
          display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
          <div style={{background:'#fff',borderRadius:10,width:'100%',maxWidth:520,
            boxShadow:'0 8px 40px rgba(0,26,122,0.2)',overflow:'hidden'}}>
            {/* Header */}
            <div style={{background:`linear-gradient(135deg,#001A7A 0%,#0034B7 100%)`,
              padding:'18px 20px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div>
                <div style={{fontSize:11,color:'rgba(248,250,252,0.6)',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:3}}>Detalhes da solicitação</div>
                <div style={{fontSize:15,fontWeight:700,color:'#fff'}}>{modalDetalhe.api}</div>
              </div>
              <button onClick={()=>setModalDetalhe(null)}
                style={{background:'rgba(255,255,255,0.15)',border:'none',borderRadius:5,
                  width:28,height:28,cursor:'pointer',color:'#fff',fontSize:16,
                  display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
            </div>
            {/* Conteúdo */}
            <div style={{padding:'20px'}}>
              {/* Status */}
              <div style={{display:'flex',justifyContent:'center',marginBottom:16}}>
                {(() => {
                  const c = statusCfg[modalDetalhe.status]||{bg:'#F1EFE8',color:'#5F5E5A',border:'#D3D1C7',dot:'#888'};
                  return (
                    <span style={{display:'inline-flex',alignItems:'center',gap:6,padding:'6px 16px',
                      borderRadius:100,fontSize:14,fontWeight:700,background:c.bg,color:c.color,
                      border:`1.5px solid ${c.border}`}}>
                      <span style={{width:8,height:8,borderRadius:'50%',background:c.dot}}/>
                      {modalDetalhe.status}
                    </span>
                  );
                })()}
              </div>
              {/* Campos */}
              <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:16}}>
                {[
                  ['Protocolo SEI',       modalDetalhe.protocolo, true],
                  ['API solicitada',      modalDetalhe.api,        false],
                  ['Órgão cedente',       modalDetalhe.orgaoCedente, false],
                  ['Responsável no SEI',  modalDetalhe.responsavel,  false],
                  ['Data da solicitação', modalDetalhe.dataSolicitacao, false],
                  ['Última atualização',  modalDetalhe.dataAtualizacao, false],
                ].map(([k,v,mono])=>(
                  <div key={k} style={{display:'flex',justifyContent:'space-between',alignItems:'center',
                    padding:'8px 12px',background:'#F8FAFC',border:'1px solid #E7E9EB',borderRadius:6}}>
                    <span style={{fontSize:12,color:'#494C57'}}>{k}</span>
                    <span style={{fontSize:13,fontWeight:500,color:'#28272C',
                      fontFamily:mono?'monospace':'inherit'}}>{v}</span>
                  </div>
                ))}
              </div>
              {/* Observação */}
              <div style={{background:'#E6F3FF',border:'1px solid #99C6FF',borderRadius:6,
                padding:'10px 12px',display:'flex',gap:8,marginBottom:16}}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#0034B7" strokeWidth="2" style={{flexShrink:0,marginTop:1}}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                <span style={{fontSize:12,color:'#0034B7',lineHeight:1.5}}>{modalDetalhe.detalhe}</span>
              </div>
              {/* Acompanhar no SEI */}
              <div style={{display:'flex',gap:8}}>
                <button
                  onClick={()=>window.open('https://sei.pe.gov.br','_blank','noopener,noreferrer')}
                  style={{flex:1,height:38,borderRadius:6,border:'1.5px solid #0034B7',
                    background:'#0034B7',color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer',
                    display:'flex',alignItems:'center',justifyContent:'center',gap:6,
                    transition:'background 0.15s'}}
                  onMouseEnter={e=>e.currentTarget.style.background='#001A7A'}
                  onMouseLeave={e=>e.currentTarget.style.background='#0034B7'}>
                  Acompanhar no SEI-PE →
                </button>
                <button onClick={()=>setModalDetalhe(null)}
                  style={{height:38,padding:'0 16px',borderRadius:6,border:'1px solid #CED2D7',
                    background:'#fff',color:'#494C57',fontSize:13,fontWeight:600,cursor:'pointer'}}>
                  ← Fechar
                </button>
              </div>
            </div>
          </div>
        </div>
      )}

        <div style={{maxWidth:1100,margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'flex-end',gap:20}}>
          <img src="../assets/ati_logo.png" alt="ATI" style={{height:36,objectFit:'contain',filter:'brightness(0) invert(1)'}} onError={e=>e.target.style.display='none'}/>
          <div style={{width:1,height:32,background:'rgba(255,255,255,0.25)'}}/>
          <img src="../assets/Governo.png" alt="Gov PE" style={{height:28,objectFit:'contain',filter:'brightness(0) invert(1)'}} onError={e=>e.target.style.display='none'}/>
        </div>
        <div style={{maxWidth:1100,margin:'8px auto 0',borderTop:'1px solid rgba(255,255,255,0.15)',paddingTop:12}}>
          <span style={{fontSize:11,color:'rgba(255,255,255,0.4)'}}>Todos os direitos reservados | ATI – Agência Estadual de Tecnologia da Informação</span>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [page, setPage]           = React.useState('Início');
  const [showSsoModal, setShowSsoModal] = React.useState(false);
  const [telaExpresso, setTelaExpresso] = React.useState(false);
  const [telaAcessoNegado, setTelaAcessoNegado] = React.useState(null);
  const [detailApi, setDetailApi] = React.useState(null);
  const [govbrUsuario, setGovbrUsuario] = React.useState(null); /* usuário autenticado via GOV.BR */

  const [usuariosCadastrados, setUsuariosCadastrados] = React.useState([...USUARIOS_AUTORIZADOS]);

  const handleAdminClick = () => { setShowSsoModal(true); };

  /* Autenticação via Expresso (ADM/Cedente → backoffice) */
  const handleAutenticar = (cpf) => {
    const cpfLimpo = cpf.trim();
    setTelaExpresso(false);
    if (usuariosCadastrados.includes(cpfLimpo)) {
      try { window.location.href = '../gerenciar-apis/index.html'; }
      catch(e) { alert('Acesso autorizado! Redirecionando para o backoffice...'); }
    } else {
      setUsuariosCadastrados(prev => prev.includes(cpfLimpo) ? prev : [...prev, cpfLimpo]);
      setTelaAcessoNegado(cpfLimpo);
    }
  };

  /* Autenticação via GOV.BR (Solicitante → Minhas Solicitações) */
  const handleGovBrAutenticar = (cpf) => {
    const cpfLimpo = cpf.trim();
    const usuario = GOVBR_USUARIOS[cpfLimpo];
    if (usuario) {
      setGovbrUsuario(usuario);
    } else {
      /* CPF não tem solicitações cadastradas — cria perfil genérico */
      setGovbrUsuario({
        nome: 'Cidadão', cpf: cpfLimpo,
        cpfMask: cpfLimpo.replace(/(\d{3})\.\d{3}\.\d{3}-(\d{2})/, '$1.XXX.XXX-$2'),
        email: '',
      });
    }
  };

  /* Tela Minhas Solicitações (GOV.BR) */
  if (govbrUsuario) {
    return <MinhasSolicitacoes usuario={govbrUsuario} onSair={()=>setGovbrUsuario(null)}/>;
  }

  /* Tela do Expresso */
  if (telaExpresso) {
    return <ExpressoScreen onVoltar={()=>setTelaExpresso(false)} onAutenticar={handleAutenticar}/>;
  }

  /* Tela de acesso negado */
  if (telaAcessoNegado) {
    return <AcessoNegadoScreen cpf={telaAcessoNegado} onVoltar={()=>setTelaAcessoNegado(null)}/>;
  }

  /* Página de detalhe da API */
  if (page === '__detail__') {
    return (
      <div style={{ minHeight:'100vh', display:'flex', flexDirection:'column' }}>
        <GovBar/>
        <Header activePage="Catálogo de APIs" onNav={p=>{ setDetailApi(null); setPage(p); }} onAdminClick={handleAdminClick}/>
        <main style={{ flex:1 }}>
          <DetailPage api={detailApi} onBack={()=>{ setDetailApi(null); setPage('Catálogo de APIs'); }}/>
        </main>
        <Footer/>
        {showSsoModal && <SsoModal onClose={()=>{ setShowSsoModal(false); setTelaExpresso(true); }} onAcessoNegado={()=>{}} onAcessoAutorizado={handleAutenticar}/>}
      </div>
    );
  }

  const pageContent = {
    'Início':           (<><Hero onNav={setPage}/><Sobre/><Faq/></>),
    'Como Acessar APIs':<ComoAcessar onNav={setPage}/>,
    'Catálogo de APIs': <CatalogPage onSelectApi={api=>{ setDetailApi(api); setPage('__detail__'); }}/>,
    'Interoperabilidade':<Interoperabilidade/>,
    'Quem somos':       <QuemSomos/>,
  };

  return (
    <div style={{ minHeight:'100vh', display:'flex', flexDirection:'column' }}>
      <GovBar/>
      <Header activePage={page} onNav={setPage} onAdminClick={handleAdminClick}/>
      <main style={{ flex:1, display:'flex', flexDirection:'column' }}>
        {pageContent[page]}
      </main>
      <Footer/>

      {/* Modal SSO — substitui completamente o AdminModal com login/senha */}
      {showSsoModal && (
        <SsoModal
          onClose={()=>{ setShowSsoModal(false); setTelaExpresso(true); }}
          onAcessoNegado={()=>{}}
          onAcessoAutorizado={handleAutenticar}
          onGovBrAutenticado={handleGovBrAutenticar}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
