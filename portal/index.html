<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal de Serviços — Governo de Pernambuco</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Barlow+Condensed:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body, #root { height: 100%; }
  body { font-family: 'Inter', sans-serif; background: #F8FAFC; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #CED2D7; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Components.jsx"></script>
<script type="text/babel" src="Screens.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#0034B7",
  "heroStyle": "full",
  "showBreadcrumbs": true
}/*EDITMODE-END*/;

function App() {
  const [screen, setScreen] = React.useState(() => localStorage.getItem('pe_screen') || 'home');
  const [screenData, setScreenData] = React.useState(null);
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [showTweaks, setShowTweaks] = React.useState(false);

  // Persist screen position
  React.useEffect(() => { localStorage.setItem('pe_screen', screen); }, [screen]);

  // Tweaks protocol
  React.useEffect(() => {
    window.addEventListener('message', (e) => {
      if (e.data?.type === '__activate_edit_mode') setShowTweaks(true);
      if (e.data?.type === '__deactivate_edit_mode') setShowTweaks(false);
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  }, []);

  const navigate = (to, data = null) => {
    setScreen(to);
    setScreenData(data);
    window.scrollTo(0, 0);
  };

  const updateTweak = (key, val) => {
    const next = { ...tweaks, [key]: val };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  };

  const screenMap = {
    home:     <HomeScreen onNavigate={navigate} tweaks={tweaks} />,
    services: <ServicesScreen onNavigate={navigate} tweaks={tweaks} />,
    detail:   <DetailScreen service={screenData || { icon:'📄', title:'Serviço', description:'Descrição', category:'Geral' }} onNavigate={navigate} />,
    form:     <FormScreen service={screenData || { icon:'📄', title:'Serviço' }} onNavigate={navigate} />,
  };

  const navItems = [
    { key: 'home', label: 'Início' },
    { key: 'services', label: 'Serviços' },
    { key: 'detail', label: 'Detalhe', data: { icon:'🎓', title:'Matrícula Escolar', description:'Realize a matrícula na rede estadual.', category:'Educação' } },
    { key: 'form', label: 'Formulário', data: { icon:'🎓', title:'Matrícula Escolar' } },
  ];

  return (
    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', position: 'relative' }}>
      {/* Screen picker */}
      <div style={{
        background: '#28272C', display: 'flex', alignItems: 'center', gap: 4,
        padding: '6px 16px', position: 'sticky', top: 0, zIndex: 100,
        borderBottom: '1px solid #494C57',
      }}>
        <span style={{ fontSize: 11, color: '#CED2D7', fontFamily: 'Inter', marginRight: 8, letterSpacing: '0.5px' }}>TELA:</span>
        {navItems.map(({ key, label, data }) => (
          <button key={key} onClick={() => navigate(key, data)} style={{
            padding: '4px 12px', borderRadius: 4, fontSize: 12, fontFamily: 'Inter', cursor: 'pointer',
            fontWeight: screen === key ? 700 : 400,
            background: screen === key ? '#0034B7' : 'transparent',
            color: screen === key ? '#fff' : '#CED2D7',
            border: 'none',
          }}>{label}</button>
        ))}
        <div style={{ flex: 1 }} />
        <span style={{ fontSize: 10, color: '#494C57', fontFamily: 'Inter' }}>Padrão Digital PE — UI Kit v1.0-beta</span>
      </div>

      {/* Portal shell */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column' }}>
        <GovBar />
        <Header
          activeMenu={{ home:'Início', services:'Serviços', detail:'Serviços', form:'Serviços' }[screen]}
          onMenuClick={(item) => {
            if (item === 'Serviços') navigate('services');
            else if (item === 'Início') navigate('home');
          }}
        />
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', background: '#F8FAFC' }}>
          {screenMap[screen] || screenMap.home}
        </div>
        <Footer />
      </div>

      {/* Tweaks panel */}
      {showTweaks && (
        <div style={{
          position: 'fixed', bottom: 20, right: 20, background: '#fff',
          border: '1px solid #E7E9EB', borderRadius: 8,
          boxShadow: '0 4px 24px rgba(0,26,122,0.16)',
          padding: 20, width: 240, zIndex: 1000,
          fontFamily: 'Inter', fontSize: 13,
        }}>
          <div style={{ fontWeight: 700, color: '#28272C', marginBottom: 16, fontSize: 14 }}>Tweaks</div>

          <div style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: '#494C57', marginBottom: 6, textTransform: 'uppercase', letterSpacing: '0.5px' }}>Cor de destaque</div>
            <div style={{ display: 'flex', gap: 8 }}>
              {['#0034B7', '#001A7A', '#AC1010', '#2B6418'].map(c => (
                <div key={c} onClick={() => updateTweak('accentColor', c)} style={{
                  width: 28, height: 28, borderRadius: 5, background: c, cursor: 'pointer',
                  border: tweaks.accentColor === c ? '3px solid #28272C' : '2px solid transparent',
                }} />
              ))}
            </div>
          </div>

          <div style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: '#494C57', marginBottom: 6, textTransform: 'uppercase', letterSpacing: '0.5px' }}>Estilo do Hero</div>
            <div style={{ display: 'flex', gap: 6 }}>
              {['full', 'compact'].map(v => (
                <button key={v} onClick={() => updateTweak('heroStyle', v)} style={{
                  flex: 1, padding: '6px 0', borderRadius: 4, border: `1.5px solid ${tweaks.heroStyle === v ? '#0034B7' : '#CED2D7'}`,
                  background: tweaks.heroStyle === v ? '#E6F3FF' : '#fff',
                  color: tweaks.heroStyle === v ? '#0034B7' : '#494C57',
                  fontSize: 12, fontWeight: tweaks.heroStyle === v ? 700 : 400, cursor: 'pointer', fontFamily: 'Inter',
                }}>{v}</button>
              ))}
            </div>
          </div>

          <div>
            <div style={{ fontSize: 11, fontWeight: 700, color: '#494C57', marginBottom: 6, textTransform: 'uppercase', letterSpacing: '0.5px' }}>Breadcrumbs</div>
            <label style={{ display: 'flex', alignItems: 'center', gap: 8, cursor: 'pointer' }}>
              <input type="checkbox" checked={tweaks.showBreadcrumbs} onChange={e => updateTweak('showBreadcrumbs', e.target.checked)} />
              <span style={{ fontSize: 13, color: '#28272C' }}>Mostrar breadcrumbs</span>
            </label>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
